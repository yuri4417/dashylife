<!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="stylesheet" href="./css/styles.css">
      <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
      <title>Tasks - DashyLife</title>
    </head>
    <body>
      <header>
        <aside>
          <nav>
            <ul class="side-bar">
                <li><a href="./index.html">Home</a></li>
                <li><a href="./tasks.html">Tasks</a></li>
                <li><a href="">Finances</a></li>
                <li class="down-buttom"><a href="">Settings</a></li>
            </ul>
          </nav>
        </aside>
      </header>
      <nav>
        <div class="task-add">
          <button class="add-btn">
            <ion-icon name="add-outline"></ion-icon>
            Add a new Task
          </button>
          
          <div class="submenu">
            <form action="/addtask" method="post">
              <input type="text" name="Title" placeholder="Task title">
              <textarea name="Description" rows="5" cols="40" placeholder="Add a description for your task."></textarea>
              <input type="date" name="Data"   placeholder="Data da tarefa">
              <input type="submit" value="Save Task">
            </form>
          </div>
        </div>
      </nav>
      <script src="./js/scripts.js"></script>
      <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
      <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    </body>
</html>
